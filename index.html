<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#060a13" id="meta-theme-color" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Circl - Privacy First Instagram Analytics</title>

    <!--
      Anti-FOUC: runs synchronously before CSS/React.
      Sets data-theme on <html> immediately from localStorage.
    -->
    <script>
      (function () {
        var DARK_BG  = '#060a13';
        var LIGHT_BG = '#f1f5f9';
        var stored = localStorage.getItem('circl-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (stored === 'light' || stored === 'dark')
          ? stored
          : (prefersDark ? 'dark' : 'light');

        var html = document.documentElement;
        html.setAttribute('data-theme', theme);
        html.style.backgroundColor = theme === 'light' ? LIGHT_BG : DARK_BG;

        var meta = document.getElementById('meta-theme-color');
        if (meta) meta.setAttribute('content', theme === 'light' ? LIGHT_BG : DARK_BG);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
